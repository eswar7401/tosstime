<!DOCTYPE html>
<html>
<head>
<title>Fantasy Points Table</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Orbitron:wght@500&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
  .points-table {
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    background: linear-gradient(135deg, rgba(99, 102, 241, 0.15) 0%, rgba(236, 72, 153, 0.05) 100%);
    border: 2px solid rgba(99, 102, 241, 0.4);
    border-radius: 20px;
    overflow: hidden;
    backdrop-filter: blur(20px);
    animation: tableSlideIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes tableSlideIn {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .points-table table {
    width: 100%;
    border-collapse: collapse;
  }

  .points-table thead {
    background: linear-gradient(135deg, rgba(99, 102, 241, 0.25) 0%, rgba(236, 72, 153, 0.2) 100%);
    border-bottom: 2px solid rgba(99, 102, 241, 0.5);
  }

  .points-table th {
    padding: 20px;
    text-align: left;
    font-size: 18px;
    font-weight: 700;
    color: #e0e0e0;
    letter-spacing: 1px;
  }

  .points-table th:first-child {
    color: #6366f1;
  }

  .points-table th:last-child {
    text-align: right;
    color: #22c55e;
  }

  .points-table tbody tr {
    border-bottom: 1px solid rgba(99, 102, 241, 0.2);
    transition: all 0.3s ease;
    animation: rowFadeIn 0.6s ease-out backwards;
  }

  @keyframes rowFadeIn {
    from {
      opacity: 0;
      transform: translateX(-20px);
    }
    to {
      opacity: 1;
      transform: translateX(0);
    }
  }

  .points-table tbody tr:nth-child(1) { animation-delay: 0.1s; }
  .points-table tbody tr:nth-child(2) { animation-delay: 0.2s; }
  .points-table tbody tr:nth-child(3) { animation-delay: 0.3s; }
  .points-table tbody tr:nth-child(4) { animation-delay: 0.4s; }
  .points-table tbody tr:nth-child(5) { animation-delay: 0.5s; }
  .points-table tbody tr:nth-child(6) { animation-delay: 0.6s; }
  .points-table tbody tr:nth-child(7) { animation-delay: 0.7s; }
  .points-table tbody tr:nth-child(8) { animation-delay: 0.8s; }

  .points-table tbody tr:hover {
    background: linear-gradient(135deg, rgba(99, 102, 241, 0.2) 0%, rgba(236, 72, 153, 0.15) 100%);
    border-left: 4px solid #6366f1;
    padding-left: 16px;
    transform: translateX(5px);
  }

  .points-table td {
    padding: 18px 20px;
    font-size: 16px;
    color: #b8bce4;
    font-weight: 500;
  }

  .points-table td:first-child {
    color: #e0e0e0;
    font-size: 17px;
    font-weight: 600;
  }

  .points-table td:last-child {
    text-align: right;
    font-size: 19px;
    font-weight: 900;
    background: linear-gradient(135deg, #22c55e, #10b981);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .loading {
    text-align: center;
    padding: 40px;
    font-size: 18px;
    color: #b8bce4;
  }

  .error {
    text-align: center;
    padding: 40px;
    font-size: 18px;
    color: #ef4444;
    background: rgba(239, 68, 68, 0.1);
    border: 2px solid rgba(239, 68, 68, 0.3);
    border-radius: 15px;
    margin: 40px;
  }

  .refresh-info {
    text-align: center;
    font-size: 14px;
    color: #6366f1;
    margin-top: 20px;
    letter-spacing: 0.5px;
  }

  .table-wrapper {
    padding: 60px 50px;
    max-width: 1000px;
    margin: 0 auto;
  }
</style>

</head>

<body>

<header>

<div class="logo-container">
<img src="logo.jpg" alt="Toss Time Logo" class="logo-img">
<div>
<h1 class="logo">TOSS TIME</h1>
<p class="tagline">It's Time To Know More About The Game</p>
</div>
</div>

<nav>

<a href="index.html">Home</a>
<a href="halloffame.html">Hall of Fame</a>
<a href="ipl.html">IPL 2026</a>
<a href="points.html">Fantasy Points Table</a>

</nav>

</header>

<!-- <section class="hero">

<h2> Fantasy Points Table</h2>

<p>Live Team Rankings & Total Points</p>

</section> -->

<section>

<div class="table-wrapper">
<div class="points-table">
<table id="pointsTable">
<thead>
<tr>
<th>TEAM NAME</th> 
<th>TOTAL POINTS</th>

</tr>
</thead>
<tbody>
<tr>
<td colspan="3" style="text-align: center; padding: 40px; color: #b8bce4;">Loading data...</td>
</tr>
</tbody>
</table>
</div>
<div class="refresh-info">⟳ Updates automatically every 5 seconds</div>
</div>

</section>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/1uEyRAr5SsxQ9gbPOKRe8N5PAt9HXfk-LRTCU_srNp3w/export?format=csv";

async function loadData(){

const response = await fetch(sheetURL);
const data = await response.text();

const rows = data.split("\n").slice(1);

let html="";

rows.forEach(row =>{

const cols = row.split(",");

html += `
<tr>
<td>${cols[0]}</td>
<td>${cols[1]}</td>

</tr>
`;

});

document.querySelector("#pointsTable tbody").innerHTML = html;

}

loadData();

/* auto refresh every */

setInterval(loadData,3000);


</script>



</body>

</html>
